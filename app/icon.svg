<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    /* Dark Theme (Default) */
    .top1 { fill: #ea580c; }
    .left1 { fill: #c2410c; }
    .right1 { fill: #9a3412; }

    .top2 { fill: #f97316; }
    .left2 { fill: #ea580c; }
    .right2 { fill: #c2410c; }

    .top3 { fill: #fefcbf; }
    .left3 { fill: #fbd38d; }
    .right3 { fill: #f6ad55; }
    
    .beam { stroke: #fbd38d; opacity: 0.6; }

    /* Light Theme Adjustments */
    @media (prefers-color-scheme: light) {
      .top1 { fill: #c2410c; }
      .left1 { fill: #9a3412; }
      .right1 { fill: #7c2d12; }

      .top2 { fill: #ea580c; }
      .left2 { fill: #c2410c; }
      .right2 { fill: #9a3412; }

      .top3 { fill: #fbd38d; } 
      .left3 { fill: #f6ad55; }
      .right3 { fill: #dd6b20; }

      .beam { stroke: #ea580c; opacity: 0.4; }
    }
  </style>
  
  <g transform="translate(0, -2)">
    <!-- Vertical Laser / 3D Extrusion Beam -->
    <line class="beam" x1="50" y1="10" x2="50" y2="94" stroke-width="1.5" stroke-dasharray="3,3" />

    <!-- Bottom Slab (Platform) -->
    <polygon class="top1" points="50,48 90,71 50,94 10,71" />
    <polygon class="left1" points="10,71 50,94 50,100 10,77" />
    <polygon class="right1" points="50,94 90,71 90,77 50,100" />

    <!-- Middle Slab (Floating Part) -->
    <polygon class="top2" points="50,39 76,54 50,69 24,54" />
    <polygon class="left2" points="24,54 50,69 50,75 24,60" />
    <polygon class="right2" points="50,69 76,54 76,60 50,75" />

    <!-- Top Slab (Small Core) -->
    <polygon class="top3" points="50,33 62,40 50,47 38,40" />
    <polygon class="left3" points="38,40 50,47 50,53 38,46" />
    <polygon class="right3" points="50,47 62,40 62,46 50,53" />

    <!-- Floating Top Crystal / Extruder Nozzle -->
    <polygon class="top3" points="50,13 54,21 50,29 46,21" />
    <polygon class="left3" points="46,21 50,29 50,31 46,23" />
    <polygon class="right3" points="50,29 54,21 54,23 50,31" />
  </g>
</svg>
